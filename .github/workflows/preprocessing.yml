name: Dataset Preprocessing

permissions:
      contents: write
      
on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  preprocess:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Preprocessing
      run: |
        cd preprocessing
        python automate_Richard_Miquel.py

    - name: Commit Output Dataset
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add preprocessing/housing_price_dataset_preprocessing/

        git diff --staged --quiet || git commit -m "Auto update preprocessing result"

        git push